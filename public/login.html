<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sophos Dashboard – Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-950 via-blue-900 to-slate-900 flex items-center justify-center">
  <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-10 w-full max-w-sm shadow-2xl">
    <div class="flex flex-col items-center mb-8">
      <div class="bg-blue-600 rounded-full p-4 mb-4 shadow-lg">
        <i class="fas fa-shield-halved text-white text-3xl"></i>
      </div>
      <h1 class="text-white text-2xl font-bold tracking-wide">Sophos Central</h1>
      <p class="text-blue-300 text-sm mt-1">National Consulting PVTLTD</p>
    </div>

    <div id="errBox" class="hidden bg-red-500/20 border border-red-400 text-red-200 rounded-lg px-4 py-3 mb-5 text-sm flex items-center gap-2">
      <i class="fas fa-circle-exclamation"></i>
      <span id="errMsg">Invalid username or password</span>
    </div>

    <form method="POST" action="/auth/login" class="space-y-5">
      <div>
        <label class="block text-blue-200 text-sm mb-1 font-medium">Username</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-blue-400"><i class="fas fa-user text-sm"></i></span>
          <input type="text" name="username" required autocomplete="username"
            class="w-full pl-9 pr-4 py-2.5 rounded-lg bg-white/10 border border-white/20 text-white placeholder-blue-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
            placeholder="admin">
        </div>
      </div>
      <div>
        <label class="block text-blue-200 text-sm mb-1 font-medium">Password</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-blue-400"><i class="fas fa-lock text-sm"></i></span>
          <input type="password" name="password" required autocomplete="current-password"
            class="w-full pl-9 pr-4 py-2.5 rounded-lg bg-white/10 border border-white/20 text-white placeholder-blue-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
            placeholder="••••••••">
        </div>
      </div>
      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2.5 rounded-lg transition-colors duration-200 shadow-md mt-2">
        <i class="fas fa-right-to-bracket mr-2"></i>Sign In
      </button>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
      document.getElementById('errBox').classList.remove('hidden');
    }
  </script>
</body>
</html>
