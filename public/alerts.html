<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alerts – Sophos Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/alpinejs@3/dist/cdn.min.js" defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex" x-data="app()" x-init="init()">

  <!-- Sidebar -->
  <aside class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col fixed h-full z-30">
    <div class="p-5 border-b border-slate-700">
      <div class="flex items-center gap-3">
        <div class="bg-blue-600 rounded-lg p-2"><i class="fas fa-shield-halved text-white text-lg"></i></div>
        <div><div class="font-bold text-white text-sm">Sophos Central</div><div class="text-xs text-slate-400">NCPL Dashboard</div></div>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <a href="/" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-blue-700/50 hover:text-white transition-colors"><i class="fas fa-gauge-high w-5 text-center"></i>Dashboard</a>
      <a href="/endpoints" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-blue-700/50 hover:text-white transition-colors"><i class="fas fa-desktop w-5 text-center"></i>Endpoints</a>
      <a href="/alerts" class="flex items-center gap-3 px-4 py-2.5 rounded-lg bg-blue-600 text-white"><i class="fas fa-bell w-5 text-center"></i>Alerts</a>
      <a href="/threats" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-blue-700/50 hover:text-white transition-colors"><i class="fas fa-virus w-5 text-center"></i>Threats</a>
      <a href="/admins" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-blue-700/50 hover:text-white transition-colors"><i class="fas fa-users-gear w-5 text-center"></i>Admins</a>
    </nav>
    <div class="p-3 border-t border-slate-700">
      <form method="POST" action="/auth/logout">
        <button class="flex items-center gap-3 px-4 py-2.5 rounded-lg w-full text-red-400 hover:bg-red-900/20 hover:text-red-300 transition-colors">
          <i class="fas fa-right-from-bracket w-5 text-center"></i>Logout
        </button>
      </form>
    </div>
  </aside>

  <main class="ml-64 flex-1 p-6">
    <div class="mb-6 flex items-center justify-between flex-wrap gap-3">
      <div>
        <h1 class="text-2xl font-bold text-white">Alerts</h1>
        <p class="text-slate-400 text-sm mt-1">All security alerts – device-wise view</p>
      </div>
      <div class="flex gap-2 flex-wrap">
        <input type="text" x-model="search" placeholder="Search alerts or device…"
          class="bg-slate-700 border border-slate-600 text-white placeholder-slate-400 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-64">
        <select x-model="sevFilter" class="bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2 text-sm">
          <option value="">All Severity</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>

    <!-- Severity counters -->
    <div class="grid grid-cols-3 gap-4 mb-6">
      <div class="bg-red-900/30 border border-red-700/50 rounded-xl p-4 flex items-center gap-3">
        <div class="bg-red-500/20 p-3 rounded-full"><i class="fas fa-circle-exclamation text-red-400 text-xl"></i></div>
        <div><div class="text-2xl font-bold text-red-300" x-text="alerts.filter(a=>a.severity==='high').length"></div><div class="text-xs text-red-400">High</div></div>
      </div>
      <div class="bg-yellow-900/20 border border-yellow-700/50 rounded-xl p-4 flex items-center gap-3">
        <div class="bg-yellow-500/20 p-3 rounded-full"><i class="fas fa-triangle-exclamation text-yellow-400 text-xl"></i></div>
        <div><div class="text-2xl font-bold text-yellow-300" x-text="alerts.filter(a=>a.severity==='medium').length"></div><div class="text-xs text-yellow-400">Medium</div></div>
      </div>
      <div class="bg-blue-900/20 border border-blue-700/50 rounded-xl p-4 flex items-center gap-3">
        <div class="bg-blue-500/20 p-3 rounded-full"><i class="fas fa-circle-info text-blue-400 text-xl"></i></div>
        <div><div class="text-2xl font-bold text-blue-300" x-text="alerts.filter(a=>a.severity==='low').length"></div><div class="text-xs text-blue-400">Low</div></div>
      </div>
    </div>

    <!-- Loading -->
    <div x-show="loading" class="text-center py-20 text-slate-400"><i class="fas fa-spinner fa-spin text-3xl"></i><p class="mt-3">Loading alerts…</p></div>

    <!-- Device-wise grouped view -->
    <div x-show="!loading">
      <template x-for="[device, devAlerts] in byDevice" :key="device">
        <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden mb-4">
          <div class="px-5 py-3 bg-slate-700/50 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <i class="fas fa-desktop text-blue-400"></i>
              <span class="font-semibold text-white" x-text="device"></span>
            </div>
            <span class="text-xs text-slate-400" x-text="devAlerts.length + ' alert(s)'"></span>
          </div>
          <table class="w-full text-sm">
            <thead class="bg-slate-700/30">
              <tr>
                <th class="px-4 py-2 text-left text-slate-400 font-medium text-xs">Severity</th>
                <th class="px-4 py-2 text-left text-slate-400 font-medium text-xs">Category</th>
                <th class="px-4 py-2 text-left text-slate-400 font-medium text-xs">Description</th>
                <th class="px-4 py-2 text-left text-slate-400 font-medium text-xs">Raised</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="a in devAlerts" :key="a.id">
                <tr class="border-t border-slate-700/30 hover:bg-slate-700/20">
                  <td class="px-4 py-2">
                    <span :class="{
                      'bg-red-500/20 text-red-300': a.severity === 'high',
                      'bg-yellow-500/20 text-yellow-300': a.severity === 'medium',
                      'bg-blue-500/20 text-blue-300': a.severity === 'low'
                    }" class="px-2 py-0.5 rounded-full text-xs font-semibold capitalize" x-text="a.severity"></span>
                  </td>
                  <td class="px-4 py-2 text-slate-400 text-xs capitalize" x-text="a.category || '—'"></td>
                  <td class="px-4 py-2 text-slate-300 text-xs max-w-sm" x-text="a.description"></td>
                  <td class="px-4 py-2 text-slate-500 text-xs" x-text="new Date(a.raisedAt).toLocaleString()"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </template>
      <div x-show="byDevice.length === 0" class="text-center py-16 text-slate-500">
        <i class="fas fa-circle-check text-green-400 text-4xl mb-3"></i>
        <p>No alerts found</p>
      </div>
    </div>
  </main>

  <script>
    function app() {
      return {
        alerts: [], loading: true, search: '', sevFilter: '',

        get filtered() {
          return this.alerts.filter(a => {
            const desc = (a.description || '').toLowerCase();
            const dev = (a.managedAgent?.name || '').toLowerCase();
            const matchSearch = !this.search || desc.includes(this.search.toLowerCase()) || dev.includes(this.search.toLowerCase());
            const matchSev = !this.sevFilter || a.severity === this.sevFilter;
            return matchSearch && matchSev;
          });
        },

        get byDevice() {
          const map = {};
          this.filtered.forEach(a => {
            const dev = a.managedAgent?.name || 'Unknown Device';
            if (!map[dev]) map[dev] = [];
            map[dev].push(a);
          });
          return Object.entries(map).sort((a, b) => b[1].length - a[1].length);
        },

        async init() {
          try {
            const data = await fetch('/api/alerts').then(r => r.json());
            this.alerts = data.items || [];
          } catch(e) { console.error(e); }
          finally { this.loading = false; }
        }
      };
    }
  </script>
</body>
</html>
