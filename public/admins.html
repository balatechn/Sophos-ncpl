<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admins – Sophos Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/alpinejs@3/dist/cdn.min.js" defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex" x-data="app()" x-init="init()">

  <!-- Sidebar -->
  <aside class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col fixed h-full z-30">
    <div class="p-5 border-b border-slate-700">
      <div class="flex items-center gap-3">
        <div class="bg-blue-600 rounded-lg p-2"><i class="fas fa-shield-halved text-white text-lg"></i></div>
        <div><div class="font-bold text-white text-sm">Sophos Central</div><div class="text-xs text-slate-400">NCPL Dashboard</div></div>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <a href="/" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-blue-700/50 hover:text-white transition-colors"><i class="fas fa-gauge-high w-5 text-center"></i>Dashboard</a>
      <a href="/endpoints" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-blue-700/50 hover:text-white transition-colors"><i class="fas fa-desktop w-5 text-center"></i>Endpoints</a>
      <a href="/alerts" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-blue-700/50 hover:text-white transition-colors"><i class="fas fa-bell w-5 text-center"></i>Alerts</a>
      <a href="/threats" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-blue-700/50 hover:text-white transition-colors"><i class="fas fa-virus w-5 text-center"></i>Threats</a>
      <a href="/admins" class="flex items-center gap-3 px-4 py-2.5 rounded-lg bg-blue-600 text-white"><i class="fas fa-users-gear w-5 text-center"></i>Admins</a>
    </nav>
    <div class="p-3 border-t border-slate-700">
      <form method="POST" action="/auth/logout">
        <button class="flex items-center gap-3 px-4 py-2.5 rounded-lg w-full text-red-400 hover:bg-red-900/20 hover:text-red-300 transition-colors">
          <i class="fas fa-right-from-bracket w-5 text-center"></i>Logout
        </button>
      </form>
    </div>
  </aside>

  <main class="ml-64 flex-1 p-6">
    <div class="mb-6 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-white">Admin Accounts</h1>
        <p class="text-slate-400 text-sm mt-1">Sophos Central administrator management</p>
      </div>
    </div>

    <div x-show="loading" class="text-center py-20 text-slate-400"><i class="fas fa-spinner fa-spin text-3xl"></i><p class="mt-3">Loading admins…</p></div>

    <div x-show="!loading" class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
      <div class="px-5 py-3 bg-slate-700/40 text-sm text-slate-400">
        <span class="text-white font-semibold" x-text="admins.length"></span> admin account(s)
      </div>
      <table class="w-full text-sm">
        <thead class="bg-slate-700/50">
          <tr>
            <th class="px-5 py-3 text-left text-slate-400 font-medium">Name</th>
            <th class="px-5 py-3 text-left text-slate-400 font-medium">Email</th>
            <th class="px-5 py-3 text-left text-slate-400 font-medium">Role</th>
            <th class="px-5 py-3 text-left text-slate-400 font-medium">Admin ID</th>
            <th class="px-5 py-3 text-left text-slate-400 font-medium">Actions</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="a in admins" :key="a.id">
            <tr class="border-t border-slate-700/50 hover:bg-slate-700/30">
              <td class="px-5 py-3">
                <div class="flex items-center gap-3">
                  <div class="bg-blue-600/30 rounded-full w-9 h-9 flex items-center justify-center text-blue-400 font-bold text-sm" x-text="(a.profile?.firstName || '?')[0].toUpperCase()"></div>
                  <span class="text-white font-medium" x-text="(a.profile?.firstName || '') + ' ' + (a.profile?.lastName || '')"></span>
                </div>
              </td>
              <td class="px-5 py-3 text-slate-300" x-text="a.profile?.email || '—'"></td>
              <td class="px-5 py-3">
                <span class="bg-blue-500/20 text-blue-300 px-2 py-0.5 rounded-full text-xs font-semibold">Super Admin</span>
              </td>
              <td class="px-5 py-3 text-slate-500 text-xs font-mono" x-text="a.id"></td>
              <td class="px-5 py-3">
                <button @click="confirmDelete(a)" class="text-red-400 hover:text-red-300 text-xs flex items-center gap-1 bg-red-500/10 px-2 py-1 rounded">
                  <i class="fas fa-trash"></i> Remove
                </button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- Delete Confirm Modal -->
    <div x-show="showConfirm" x-cloak class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
      <div class="bg-slate-800 rounded-2xl border border-red-700/50 w-full max-w-md shadow-2xl p-6">
        <div class="flex items-center gap-3 mb-4">
          <div class="bg-red-500/20 p-3 rounded-full"><i class="fas fa-user-xmark text-red-400 text-xl"></i></div>
          <div>
            <h2 class="font-bold text-white">Remove Admin?</h2>
            <p class="text-slate-400 text-sm" x-text="'This will remove: ' + (target?.profile?.firstName || '') + ' (' + (target?.profile?.email || '') + ')'"></p>
          </div>
        </div>
        <p class="text-slate-400 text-sm mb-6">The admin will lose all access to Sophos Central immediately.</p>
        <div class="flex gap-3 justify-end">
          <button @click="showConfirm = false" class="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-white text-sm">Cancel</button>
          <button @click="deleteAdmin()" :disabled="deleting" class="px-4 py-2 rounded-lg bg-red-600 hover:bg-red-500 text-white text-sm font-semibold disabled:opacity-50">
            <span x-show="!deleting">Remove</span>
            <span x-show="deleting"><i class="fas fa-spinner fa-spin mr-1"></i>Removing…</span>
          </button>
        </div>
      </div>
    </div>
  </main>

  <script>
    function app() {
      return {
        admins: [], loading: true,
        showConfirm: false, target: null, deleting: false,

        async init() {
          try {
            const data = await fetch('/api/admins').then(r => r.json());
            this.admins = data.items || [];
          } catch(e) { console.error(e); }
          finally { this.loading = false; }
        },

        confirmDelete(a) { this.target = a; this.showConfirm = true; },

        async deleteAdmin() {
          this.deleting = true;
          try {
            await fetch(`/api/admins/${this.target.id}`, { method: 'DELETE' });
            this.admins = this.admins.filter(a => a.id !== this.target.id);
            this.showConfirm = false;
          } catch(e) { alert('Error: ' + e.message); }
          finally { this.deleting = false; }
        }
      };
    }
  </script>
</body>
</html>
